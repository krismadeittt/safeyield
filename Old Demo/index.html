</script>


<script>
(function(){
var HP={},HD={},HCM="monthly",HCD=null,HB=null,loaded=false,active=false,injected=false;
var WURL="https://history-workerjs.kisoarmicmusic.workers.dev";
function gP(tk,ym){var a=HP[tk];if(!a)return null;for(var i=0;i<a.length;i++)if(a[i][0]===ym)return a[i][1];return null}
function gD(tk,ym){var a=HD[tk];if(!a)return 0;var t=0;for(var i=0;i<a.length;i++)if(a[i][0]===ym)t+=a[i][1];return t}
function ymA(ym,n){var y=Math.floor(ym/100),m=ym%100;m+=n;while(m>12){m-=12;y++}while(m<1){m+=12;y--}return y*100+m}
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function ymS(ym){return MN[(ym%100)-1].charAt(0)+"'"+String(Math.floor(ym/100)).slice(2)}
function loadData(){
  if(loaded)return Promise.resolve();
  return fetch(WURL+"/all").then(function(r){return r.json()}).then(function(d){
    HP=d.prices||{};HD=d.dividends||{};loaded=true;
  }).catch(function(e){console.error("Hist worker:",e)});
}
function calc(holdings){
  var tks=holdings.filter(function(h){return h.shares>0&&HP[h.ticker]});
  if(!tks.length)return;
  var now=202603,start=202103;
  var sND={},sDR={};
  tks.forEach(function(h){sND[h.ticker]=h.shares;sDR[h.ticker]=h.shares});
  var months=[];for(var ym=start;ym<=now;ym=ymA(ym,1))months.push(ym);
  var data=[];
  for(var mi=0;mi<months.length;mi++){
    var m=months[mi],vND=0,vDR=0;
    tks.forEach(function(h){var p=gP(h.ticker,m);if(p){vND+=sND[h.ticker]*p;vDR+=sDR[h.ticker]*p}});
    data.push({ym:m,nd:Math.round(vND),dr:Math.round(vDR),h:true});
    tks.forEach(function(h){var dv=gD(h.ticker,m);if(dv>0){var p=gP(h.ticker,m);if(p>0){sDR[h.ticker]+=sDR[h.ticker]*dv/p}}});
  }
  var sv=data[0].nd,cND=data[data.length-1].nd,cDR=data[data.length-1].dr;
  var mr=Math.pow(1.07,1/12)-1;
  var lyD=0;tks.forEach(function(h){var a=HD[h.ticker];if(!a)return;for(var i=0;i<a.length;i++)if(a[i][0]>=202503)lyD+=a[i][1]*h.shares});
  var mdr=(cND>0?lyD/cND:.03)/12;
  var pND=cND,pDR=cDR;
  for(var fi=1;fi<=60;fi++){pND*=(1+mr);pDR*=(1+mr+mdr);data.push({ym:ymA(now,fi),nd:Math.round(pND),dr:Math.round(pDR),h:false})}
  HCD=data;active=true;
  injectChart();
}
function findTitleEl(){
  var divs=document.querySelectorAll("div");
  for(var i=0;i<divs.length;i++){
    var el=divs[i];
    if(el.childNodes.length===1&&el.textContent==="Historical & Projected Income"&&el.style.fontWeight==="800")return el;
  }
  return null;
}
function injectChart(){
  if(!HCD)return;
  var titleEl=findTitleEl();
  if(!titleEl)return;
  var section=titleEl.parentElement;
  if(!section)return;
  var card=section.parentElement;
  if(!card)return;
  if(!injected){
    var allSvg=card.querySelectorAll("svg");
    for(var i=0;i<allSvg.length;i++){
      var p=allSvg[i].parentElement;
      while(p&&p!==card){
        if(p.parentElement===card||p.parentElement===section){p.style.display="none";break}
        p=p.parentElement;
      }
    }
    var wrap=document.createElement("div");
    wrap.id="_hcW";
    wrap.innerHTML='<div style="display:flex;gap:1rem;flex-wrap:wrap;margin:.6rem 0 .4rem"><div style="display:flex;align-items:center;gap:5px;font-size:.65rem;color:#2a4a6a;font-family:system-ui"><div style="width:12px;height:8px;background:#1a7a3a"></div>Hist DRIP</div><div style="display:flex;align-items:center;gap:5px;font-size:.65rem;color:#2a4a6a;font-family:system-ui"><div style="width:12px;height:8px;background:#0f4a22"></div>Hist</div><div style="display:flex;align-items:center;gap:5px;font-size:.65rem;color:#2a4a6a;font-family:system-ui"><div style="width:12px;height:8px;background:#005EB8"></div>Proj DRIP</div><div style="display:flex;align-items:center;gap:5px;font-size:.65rem;color:#2a4a6a;font-family:system-ui"><div style="width:12px;height:8px;background:#1a3a5c"></div>Proj</div></div><div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem" id="_hcS"></div><div style="position:relative"><div id="_hcT" style="display:none;position:absolute;top:8px;right:12px;background:#071525;border:1px solid rgba(0,94,184,.4);padding:.4rem .8rem;text-align:right;min-width:170px;pointer-events:none;z-index:10"><div id="_htl" style="font-size:.58rem;color:#3a7abd;font-weight:700;font-family:system-ui;margin-bottom:2px"></div><div id="_htv" style="font-size:1rem;font-weight:800;color:#5aaff8;font-family:system-ui"></div><div id="_hts" style="font-size:.58rem;color:#1e3a58;font-family:system-ui"></div></div><div style="display:flex"><svg id="_hya" style="flex-shrink:0;overflow:visible"></svg><div style="overflow-x:auto;flex:1"><svg id="_hch"></svg></div></div></div>';
    card.appendChild(wrap);
    injected=true;
  }
  drawStats();
  draw();
}
function drawStats(){
  if(!HCD||!HCD.length)return;
  var sv=0,cDR=0,cND=0,fDR=0;
  for(var i=0;i<HCD.length;i++){if(i===0)sv=HCD[i].nd;if(HCD[i].h){cDR=HCD[i].dr;cND=HCD[i].nd}fDR=HCD[i].dr}
  var hr=sv>0?((cDR-sv)/sv*100).toFixed(1):"0",da=cDR-cND;
  var el=document.getElementById("_hcS");
  if(el)el.innerHTML='<div style="background:#040c18;border:1px solid #0a1e30;padding:.45rem .7rem;flex:1;min-width:110px"><div style="font-size:.55rem;color:#1a4060;text-transform:uppercase;letter-spacing:.12em;font-family:system-ui;margin-bottom:2px">Starting (2021)</div><div style="font-size:.95rem;font-weight:800;color:#5aaff8;font-family:system-ui">$'+sv.toLocaleString()+'</div></div><div style="background:#040c18;border:1px solid #0a1e30;padding:.45rem .7rem;flex:1;min-width:110px"><div style="font-size:.55rem;color:#1a4060;text-transform:uppercase;letter-spacing:.12em;font-family:system-ui;margin-bottom:2px">Current (DRIP)</div><div style="font-size:.95rem;font-weight:800;color:#00cc66;font-family:system-ui">$'+cDR.toLocaleString()+'</div><div style="font-size:.55rem;color:#1e3a58;font-family:system-ui">+'+hr+'%</div></div><div style="background:#040c18;border:1px solid #0a1e30;padding:.45rem .7rem;flex:1;min-width:110px"><div style="font-size:.55rem;color:#1a4060;text-transform:uppercase;letter-spacing:.12em;font-family:system-ui;margin-bottom:2px">DRIP Advantage</div><div style="font-size:.95rem;font-weight:800;color:#5aaff8;font-family:system-ui">+$'+da.toLocaleString()+'</div></div><div style="background:#040c18;border:1px solid #0a1e30;padding:.45rem .7rem;flex:1;min-width:110px"><div style="font-size:.55rem;color:#1a4060;text-transform:uppercase;letter-spacing:.12em;font-family:system-ui;margin-bottom:2px">Projected 5Y</div><div style="font-size:.95rem;font-weight:800;color:#5aaff8;font-family:system-ui">$'+fDR.toLocaleString()+'</div></div>';
}
function draw(){
  if(!HCD)return;var data=HCD,now=202603,bars=[];
  if(HCM==="monthly")data.forEach(function(d){bars.push({ym:d.ym,nd:d.nd,dr:d.dr,h:d.h,lb:ymS(d.ym)})});
  else if(HCM==="quarterly")for(var i=0;i<data.length;i++){var m=data[i].ym%100;if(m===3||m===6||m===9||m===12||i===data.length-1)bars.push({ym:data[i].ym,nd:data[i].nd,dr:data[i].dr,h:data[i].h,lb:"Q"+(m<=3?1:m<=6?2:m<=9?3:4)+"'"+String(Math.floor(data[i].ym/100)).slice(2)})}
  else{var by={};data.forEach(function(d){by[Math.floor(d.ym/100)]=d});Object.keys(by).sort().forEach(function(y){var d=by[y];bars.push({ym:d.ym,nd:d.nd,dr:d.dr,h:d.h,lb:y})})}
  var ni=-1;for(var i=0;i<bars.length;i++)if(bars[i].ym<=now)ni=i;
  var mx=1;bars.forEach(function(b){if(b.dr>mx)mx=b.dr;if(b.nd>mx)mx=b.nd});
  var cH=240,tp=12,bp=28,dH=cH-tp-bp;
  var bW=HCM==="monthly"?7:HCM==="quarterly"?20:44;
  var gap=Math.max(1,Math.floor(bW*.2)),step=bW+gap,cW=bars.length*step+4,yW=52;
  var ya=document.getElementById("_hya");if(!ya)return;ya.setAttribute("width",yW);ya.setAttribute("height",cH);
  var yh="";for(var g=0;g<=4;g++){var fr=g/4,yy=tp+dH*(1-fr),v=mx*fr;var lb=v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"k":"$"+Math.round(v);yh+='<line x1="'+(yW-4)+'" y1="'+yy+'" x2="'+yW+'" y2="'+yy+'" stroke="#0a2040"/>';yh+='<text x="'+(yW-7)+'" y="'+(yy+4)+'" text-anchor="end" fill="#1a4060" font-size="9" font-family="system-ui">'+lb+'</text>'}ya.innerHTML=yh;
  var svg=document.getElementById("_hch");svg.setAttribute("width",cW);svg.setAttribute("height",cH);svg.style.display="block";
  var s="";for(var g=0;g<=4;g++){var yy=tp+dH*(1-g/4);s+='<line x1="0" y1="'+yy+'" x2="'+cW+'" y2="'+yy+'" stroke="#081828" stroke-width=".5"/>'}
  for(var i=0;i<bars.length;i++){var b=bars[i],x=i*step;var hDR=Math.max(2,b.dr/mx*dH),hND=Math.max(2,b.nd/mx*dH);var yDR=tp+dH-hDR,yND=tp+dH-hND;var cDRc=b.h?"#1a7a3a":"#005EB8",cNDc=b.h?"#0f4a22":"#1a3a5c";s+='<rect x="'+x+'" y="'+yND+'" width="'+bW+'" height="'+hND+'" fill="'+cNDc+'"/>';if(b.dr>b.nd){var eH=hDR-hND;s+='<rect x="'+x+'" y="'+yDR+'" width="'+bW+'" height="'+eH+'" fill="'+cDRc+'"/>'}else s+='<rect x="'+x+'" y="'+yDR+'" width="'+bW+'" height="'+hDR+'" fill="'+cDRc+'"/>';s+='<rect x="'+x+'" y="'+tp+'" width="'+step+'" height="'+dH+'" fill="transparent" style="cursor:pointer" onmouseenter="window._hST('+i+')" onmouseleave="window._hHT()"/>';var sl=false;if(HCM==="yearly")sl=true;else if(HCM==="quarterly")sl=i%4===0;else sl=bars[i].ym%100===1;if(sl)s+='<text x="'+(x+bW/2)+'" y="'+(tp+dH+16)+'" text-anchor="middle" fill="#1a4060" font-size="8" font-family="system-ui">'+b.lb+'</text>'}
  if(ni>=0){var nx=ni*step+step/2;s+='<line x1="'+nx+'" y1="'+tp+'" x2="'+nx+'" y2="'+(tp+dH)+'" stroke="#005EB8" stroke-width="2" stroke-dasharray="6,3"/>';s+='<text x="'+nx+'" y="'+(tp-3)+'" text-anchor="middle" fill="#005EB8" font-size="10" font-weight="700" font-family="system-ui">NOW</text>'}
  svg.innerHTML=s;HB=bars;
}
window._hST=function(i){var b=HB[i];document.getElementById("_htl").textContent=MN[(b.ym%100)-1]+" "+Math.floor(b.ym/100)+(b.h?" (actual)":" (projected)");document.getElementById("_htv").textContent="$"+b.dr.toLocaleString();document.getElementById("_hts").textContent="No DRIP: $"+b.nd.toLocaleString()+" | DRIP +$"+(b.dr-b.nd).toLocaleString();document.getElementById("_hcT").style.display="block"};
window._hHT=function(){document.getElementById("_hcT").style.display="none"};
document.addEventListener("click",function(e){var t=e.target;if(!t||!active)return;var x=t.textContent.trim();if(x==="Quarterly"){HCM="quarterly";draw()}else if(x==="Monthly"){HCM="monthly";draw()}else if(x==="Yearly"){HCM="yearly";draw()}});
var prevKey="";
function poll(){var h=window._h;if(!h||!h.length){prevKey="";active=false;return}var key=h.map(function(x){return x.ticker+":"+x.shares}).sort().join(",");if(key===prevKey&&active)return;prevKey=key;loadData().then(function(){calc(h)})}
setInterval(poll,1500);setTimeout(poll,2000);
})();

</script>
</body></html>
